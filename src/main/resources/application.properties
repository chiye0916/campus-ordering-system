spring.application.name=demo3
spring.config.import=optional:file:./application-local.properties
info.app.name=${spring.application.name}
info.app.version=0.0.1-SNAPSHOT

server.port=8080
server.address=127.0.0.1

spring.datasource.url=jdbc:mysql://localhost:3306/demo3_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=chiye
spring.datasource.password=${MYSQL_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath:mapper/*.xml

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.health.mail.enabled=false
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] traceId=%X{traceId:-} %logger{36} - %msg%n

jwt.secret-key=${JWT_SECRET_KEY:demo3-local-secret-key-change-me}
jwt.ttl-millis=7200000

spring.data.redis.host=localhost
spring.data.redis.port=6379

dish.cache.list-ttl=30m
dish.cache.empty-list-ttl=5m

spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=demo3
spring.rabbitmq.password=12345
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.default-requeue-rejected=false

order.timeout.delay=15m
order.timeout.outbox.publish-fixed-delay=5s
order.timeout.outbox.publish-batch-size=20
order.timeout.outbox.max-retry-count=5
order.timeout.outbox.retry-delay=30s
order.timeout.outbox.publisher-confirm-timeout=5s
order.timeout.outbox.publisher-claim-timeout=2m
order.timeout.listener.retry.max-attempts=3
order.timeout.listener.retry.initial-interval=1s
order.timeout.listener.retry.multiplier=2.0
order.timeout.listener.retry.max-interval=10s
